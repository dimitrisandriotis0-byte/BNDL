<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — BNDL</title>
  <meta name="description" content="Get in touch with BNDL. We'd love to hear from you.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .contact-grid {
      display: grid; grid-template-columns: 1fr; gap: var(--space-10);
    }
    @media(min-width:768px) { .contact-grid { grid-template-columns: 1fr 1fr; } }
    .contact-info { display: flex; flex-direction: column; gap: var(--space-8); }
    .contact-info__item { display: flex; gap: var(--space-4); }
    .contact-info__icon {
      width: 48px; height: 48px; border-radius: 50%; background: var(--bg-alt); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .contact-info__icon svg { width: 20px; height: 20px; stroke: var(--text); }
    .contact-info__label { font-size: var(--font-xs); color: var(--text-muted); text-transform: uppercase; letter-spacing: var(--letter-spacing-wide); margin-bottom: var(--space-1); }
    .contact-info__value { font-weight: var(--font-weight-medium); }
    .contact-map {
      margin-top: var(--space-8); border-radius: var(--radius-lg); overflow: hidden;
      aspect-ratio: 16/9; background: var(--bg-alt); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; color: var(--text-muted);
    }
  </style>
</head>
<body>
<div class="preloader" id="preloader"><div class="preloader__text"><span>B</span><span>N</span><span>D</span><span>L</span></div></div>

<section class="page-header page-transition">
  <div class="container">
    <h1 class="page-header__title" data-i18n="contact.title">Contact Us</h1>
    <p class="page-header__subtitle" data-i18n="contact.subtitle">Have a question? We'd love to hear from you.</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="contact-grid">
      <form class="reveal" onsubmit="event.preventDefault(); alert('Message sent! We\'ll get back to you soon.'); this.reset();">
        <div class="form-group">
          <input type="text" class="form-group__input" placeholder=" " required>
          <label class="form-group__label" data-i18n="contact.name">Your Name</label>
        </div>
        <div class="form-group">
          <input type="email" class="form-group__input" placeholder=" " required>
          <label class="form-group__label" data-i18n="contact.email">Email Address</label>
        </div>
        <div class="form-group">
          <input type="text" class="form-group__input" placeholder=" ">
          <label class="form-group__label" data-i18n="contact.subject">Subject</label>
        </div>
        <div class="form-group">
          <textarea class="form-group__input" placeholder=" " rows="5" required></textarea>
          <label class="form-group__label" data-i18n="contact.message">Your Message</label>
        </div>
        <button type="submit" class="btn btn--primary btn--lg" data-i18n="contact.send">Send Message</button>
      </form>
      <div class="reveal-right">
        <h3 style="font-size:var(--font-xl);font-weight:var(--font-weight-bold);margin-bottom:var(--space-8)" data-i18n="contact.info">Contact Information</h3>
        <div class="contact-info">
          <div class="contact-info__item">
            <div class="contact-info__icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
            <div><div class="contact-info__label" data-i18n="contact.emailLabel">Email</div><div class="contact-info__value">hello@bndl.gr</div></div>
          </div>
          <div class="contact-info__item">
            <div class="contact-info__icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg></div>
            <div><div class="contact-info__label" data-i18n="contact.phoneLabel">Phone</div><div class="contact-info__value">+30 210 1234567</div></div>
          </div>
          <div class="contact-info__item">
            <div class="contact-info__icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1118 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
            <div><div class="contact-info__label" data-i18n="contact.addressLabel">Address</div><div class="contact-info__value" data-i18n="contact.addressValue">Athens, Greece</div></div>
          </div>
        </div>
        <div class="contact-map">
          <span>Google Maps Embed Placeholder</span>
        </div>
      </div>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="js/data.js"></script>
<script src="js/theme.js"></script>
<script src="js/language.js"></script>
<script src="js/cart.js"></script>
<script src="js/animations.js"></script>
<script src="js/app.js"></script>
</body>
</html>
