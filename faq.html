<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAQ — BNDL</title>
  <meta name="description" content="Frequently asked questions about BNDL bundles, ordering, printing, shipping, and more.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .faq-container { max-width: 800px; margin: 0 auto; }
    .faq-cta { text-align: center; margin-top: var(--space-16); padding: var(--space-10); background: var(--bg-alt); border-radius: var(--radius-xl); border: 1px solid var(--border); }
    .faq-cta p { color: var(--text-secondary); margin-bottom: var(--space-6); }
  </style>
</head>
<body>
<div class="preloader" id="preloader"><div class="preloader__text"><span>B</span><span>N</span><span>D</span><span>L</span></div></div>

<section class="page-header page-transition">
  <div class="container">
    <h1 class="page-header__title" data-i18n="faq.title">FAQ</h1>
    <p class="page-header__subtitle" data-i18n="faq.subtitle">Everything you need to know about ordering with BNDL</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="faq-container" id="faqContainer"></div>
    <div class="faq-cta reveal">
      <p>Still have questions?</p>
      <a href="contact.html" class="btn btn--primary">Contact Us</a>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="js/data.js"></script>
<script src="js/theme.js"></script>
<script src="js/language.js"></script>
<script src="js/cart.js"></script>
<script src="js/animations.js"></script>
<script src="js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const container = document.getElementById('faqContainer');
  FAQ_DATA.forEach((faq, i) => {
    const q = Language.current === 'gr' ? faq.qGr : faq.q;
    const a = Language.current === 'gr' ? faq.aGr : faq.a;
    container.innerHTML += `
      <div class="accordion__item reveal" style="transition-delay:${i * 50}ms">
        <button class="accordion__trigger" onclick="this.parentElement.classList.toggle('active'); const c=this.nextElementSibling; c.style.maxHeight=c.style.maxHeight?null:c.scrollHeight+'px';">
          <span>${q}</span>
          <svg class="accordion__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <div class="accordion__content">
          <div class="accordion__content-inner">${a}</div>
        </div>
      </div>
    `;
  });
});
</script>

<!-- Preloader Script -->
<script>
document.addEventListener('DOMContentLoaded', () => {
  // Add preloader-active class to body
  document.body.classList.add('preloader-active');
  
  // Hide preloader after 1.5s and show page content
  setTimeout(() => {
    const preloader = document.getElementById('preloader');
    if (preloader) {
      preloader.classList.add('hidden');
    }
    
    // Remove preloader-active class to show page content
    setTimeout(() => {
      document.body.classList.remove('preloader-active');
    }, 500); // Wait for fade-out animation
  }, 1500);
});
</script>
</body>
</html>
