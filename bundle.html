<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bundle Details — BNDL</title>
  <meta name="description" content="View bundle details, items included, pricing, and add to cart.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .bundle-detail { padding-top: var(--space-32); }
    .bundle-detail__hero-image {
      width: 100%;
      aspect-ratio: 16/9;
      max-height: 70vh;
      object-fit: cover;
      border-radius: var(--radius-2xl);
      margin-bottom: var(--space-12);
      margin-top: var(--space-8);
      background: var(--bg-alt);
    }
    .bundle-detail__info-container {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
    }
    .bundle-detail__info { 
      display: flex; 
      flex-direction: column; 
      gap: var(--space-6); 
    }
    .bundle-detail__back {
      font-size: var(--font-sm);
      color: var(--text-muted);
      margin-bottom: var(--space-2);
      display: inline-block;
      transition: color var(--duration-fast);
    }
    .bundle-detail__back:hover { color: var(--text); }
    .bundle-detail__category {
      font-size: var(--font-xs);
      font-weight: var(--font-weight-semibold);
      text-transform: uppercase;
      letter-spacing: var(--letter-spacing-wider);
      color: var(--text-muted);
    }
    .bundle-detail__name {
      font-size: var(--font-3xl);
      font-weight: var(--font-weight-bold);
      letter-spacing: var(--letter-spacing-tight);
      line-height: var(--line-height-tight);
    }
    @media (min-width: 768px) {
      .bundle-detail__name { font-size: var(--font-4xl); }
    }
    .bundle-detail__sku {
      font-size: var(--font-xs);
      color: var(--text-muted);
    }
    .bundle-detail__price-row {
      display: flex;
      align-items: baseline;
      gap: var(--space-4);
      flex-wrap: wrap;
    }
    .bundle-detail__price {
      font-size: var(--font-4xl);
      font-weight: var(--font-weight-extrabold);
    }
    .bundle-detail__original {
      font-size: var(--font-xl);
      color: var(--text-muted);
      text-decoration: line-through;
    }
    .bundle-detail__save {
      background: var(--badge-bg);
      color: var(--badge-text);
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      font-size: var(--font-sm);
      font-weight: var(--font-weight-bold);
      animation: pulse 2s ease infinite;
    }
    .bundle-detail__vat {
      font-size: var(--font-sm);
      color: var(--text-muted);
    }
    .bundle-detail__items-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }
    .bundle-detail__item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      font-size: var(--font-base);
      color: var(--text-secondary);
    }
    .bundle-detail__item-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
    }
    .bundle-detail__includes {
      font-size: var(--font-sm);
      color: var(--text-secondary);
      padding: var(--space-4);
      background: var(--bg-alt);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
    }
    .bundle-detail__note {
      font-size: var(--font-sm);
      color: var(--text-muted);
      line-height: var(--line-height-relaxed);
      padding: var(--space-4);
      border-left: 3px solid var(--border);
    }
    .bundle-detail__cta {
      display: flex;
      gap: var(--space-4);
      align-items: center;
    }
    .bundle-detail__cta .btn { flex: 1; max-width: 300px; }
    .bundle-detail__item-count-badge {
      font-size: var(--font-sm);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    .related-section { margin-top: var(--space-20); }
    .related-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-6);
    }
    @media (min-width: 768px) { .related-grid { grid-template-columns: repeat(3, 1fr); } }
  </style>
</head>
<body>

<div class="preloader" id="preloader">
  <div class="preloader__text"><span>B</span><span>N</span><span>D</span><span>L</span></div>
</div>

<section class="bundle-detail section page-transition">
  <div class="container" id="bundleContent">
    <!-- Populated by JS -->
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="js/data.js"></script>
<script src="js/theme.js"></script>
<script src="js/language.js"></script>
<script src="js/cart.js"></script>
<script src="js/animations.js"></script>
<script src="js/app.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const bundle = BUNDLES.find(b => b.id === id);
  const container = document.getElementById('bundleContent');
  const t = TRANSLATIONS[Language.current];

  if (!bundle) {
    container.innerHTML = '<div class="text-center" style="padding:var(--space-20) 0"><h2>Bundle not found</h2><p class="text-muted" style="margin-top:var(--space-4)">The bundle you\'re looking for doesn\'t exist.</p><a href="bundles.html" class="btn btn--primary" style="margin-top:var(--space-8)">Browse All Bundles</a></div>';
    return;
  }

  const name = Language.getBundleName(bundle);
  const cat = CATEGORIES.find(c => c.id === bundle.category);
  const catName = cat ? Language.getCategoryName(cat) : bundle.category;

  // Update page title
  document.title = `${name} — BNDL`;

  // Related bundles
  const related = BUNDLES.filter(b => b.category === bundle.category && b.id !== bundle.id);

  container.innerHTML = `
    <a href="bundles.html" class="bundle-detail__back reveal" data-i18n="bundle.backToBundles">${t.bundle.backToBundles}</a>

    <img src="images/${bundle.category}-${bundle.tier}.png" alt="${name}" class="bundle-detail__hero-image blur-up reveal">

    <div class="bundle-detail__info-container">
      <div class="bundle-detail__info">
        <div class="reveal">
          <span class="bundle-detail__category">${catName}</span>
        </div>
        <h1 class="bundle-detail__name reveal">${name}</h1>
        <span class="bundle-detail__sku reveal">SKU: ${bundle.sku}</span>

        <div class="bundle-detail__price-row reveal">
          <span class="bundle-detail__price">${App.formatPrice(bundle.price)}</span>
          <span class="bundle-detail__original">${App.formatPrice(bundle.originalPrice)}</span>
          <span class="bundle-detail__save">${t.bundles.save} €${bundle.savings}</span>
        </div>
        <span class="bundle-detail__vat reveal">${t.bundles.vat}</span>

        <div class="bundle-detail__item-count-badge reveal">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
          ${bundle.itemCount} ${t.bundles.items}
        </div>

        <div class="bundle-detail__items-list stagger-children" style="margin-top:var(--space-2)">
          ${bundle.items.map(item => `<div class="bundle-detail__item"><span class="bundle-detail__item-dot"></span>${item}</div>`).join('')}
        </div>

        <div class="bundle-detail__includes reveal">
          ✓ ${bundle.includes}
        </div>

        <div class="bundle-detail__note reveal" data-i18n="bundle.sizeNote">${t.bundle.sizeNote}</div>
        <div class="bundle-detail__note reveal" data-i18n="bundle.printNote">${t.bundle.printNote}</div>

        <div class="bundle-detail__cta reveal">
          <button class="btn btn--primary btn--lg btn--magnetic btn--cart" id="addToCartBtn" onclick="BundleDetailPage.addToCart('${bundle.id}')">
            <span data-i18n="bundle.addToCart">${t.bundle.addToCart}</span>
          </button>
        </div>
      </div>
    </div>

    ${related.length ? `
    <div class="related-section">
      <div class="section__header reveal">
        <h2 class="section__title" data-i18n="bundle.related">${t.bundle.related}</h2>
      </div>
      <div class="related-grid">
        ${related.map(b => App.renderBundleCard(b)).join('')}
      </div>
    </div>
    ` : ''}
  `;

  // Re-init animations
  setTimeout(() => {
    Animations.initScrollReveal();
    Animations.initBlurUpImages();
    Animations.initMagneticButtons();
    Animations.initCardTilt();
  }, 100);
});

const BundleDetailPage = {
  addToCart(id) {
    const btn = document.getElementById('addToCartBtn');
    const t = TRANSLATIONS[Language.current];
    btn.classList.add('adding');
    setTimeout(() => {
      btn.classList.remove('adding');
      btn.classList.add('added');
      btn.querySelector('span').textContent = t.bundle.added;
      Cart.addItem(id);
      setTimeout(() => {
        btn.classList.remove('added');
        btn.querySelector('span').textContent = t.bundle.addToCart;
      }, 1500);
    }, 200);
  }
};
</script>
</body>
</html>
