<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — BNDL</title>
  <meta name="description" content="Tips, trends, and insights on branded merchandise from BNDL.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .blog-grid { display: grid; grid-template-columns: 1fr; gap: var(--space-8); }
    @media(min-width:768px) { .blog-grid { grid-template-columns: repeat(2,1fr); } }
    @media(min-width:1024px) { .blog-grid { grid-template-columns: repeat(3,1fr); } }
    .blog-card { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: all var(--duration-normal) var(--ease-out); background: var(--card-bg); }
    .blog-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); }
    .blog-card__image { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
    .blog-card__content { padding: var(--space-6); }
    .blog-card__date { font-size: var(--font-xs); color: var(--text-muted); margin-bottom: var(--space-3); display: flex; align-items: center; gap: var(--space-3); }
    .blog-card__title { font-size: var(--font-lg); font-weight: var(--font-weight-bold); margin-bottom: var(--space-3); line-height: var(--line-height-snug); }
    .blog-card__excerpt { font-size: var(--font-sm); color: var(--text-secondary); line-height: var(--line-height-relaxed); margin-bottom: var(--space-4); }
    .blog-card__link { font-size: var(--font-sm); font-weight: var(--font-weight-semibold); color: var(--text); }
    .blog-card__source { font-size: var(--font-xs); color: var(--text-muted); margin-top: var(--space-3); }
    .skeleton { background: linear-gradient(90deg, var(--bg) 25%, var(--bg-alt) 50%, var(--bg) 75%); background-size: 200% 100%; animation: skeleton 1.5s infinite; }
    @keyframes skeleton { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton-card { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; background: var(--card-bg); }
    .skeleton-image { width: 100%; aspect-ratio: 16/9; }
    .skeleton-content { padding: var(--space-6); }
    .skeleton-date { width: 120px; height: 12px; border-radius: var(--radius); margin-bottom: var(--space-3); }
    .skeleton-title { width: 100%; height: 24px; border-radius: var(--radius); margin-bottom: var(--space-3); }
    .skeleton-excerpt { width: 100%; height: 48px; border-radius: var(--radius); margin-bottom: var(--space-4); }
    .skeleton-link { width: 80px; height: 16px; border-radius: var(--radius); }
  </style>
</head>
<body>
<div class="preloader" id="preloader"><div class="preloader__text"><span>B</span><span>N</span><span>D</span><span>L</span></div></div>

<section class="page-header page-transition">
  <div class="container">
    <h1 class="page-header__title" data-i18n="blog.title">Blog</h1>
    <p class="page-header__subtitle" data-i18n="blog.subtitle">Tips, trends, and insights on branded merchandise</p>
    <p style="font-size: var(--font-xs); color: var(--text-muted); margin-top: var(--space-2);">Curated articles from trusted industry sources</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="blog-grid stagger-children" id="blogGrid"></div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="js/data.js"></script>
<script src="js/theme.js"></script>
<script src="js/language.js"></script>
<script src="js/cart.js"></script>
<script src="js/animations.js"></script>
<script src="js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const grid = document.getElementById('blogGrid');
  const t = TRANSLATIONS[Language.current];
  
  // Show skeleton loading cards
  function showSkeletonCards() {
    grid.innerHTML = '';
    for (let i = 0; i < 6; i++) {
      grid.innerHTML += `
        <div class="skeleton-card">
          <div class="skeleton skeleton-image"></div>
          <div class="skeleton-content">
            <div class="skeleton skeleton-date"></div>
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-excerpt"></div>
            <div class="skeleton skeleton-link"></div>
          </div>
        </div>
      `;
    }
  }
  
  // Show fallback static posts
  function showFallbackPosts() {
    grid.innerHTML = '';
    BLOG_POSTS.forEach(post => {
      const title = Language.current === 'gr' ? post.titleGr : post.title;
      const excerpt = Language.current === 'gr' ? post.excerptGr : post.excerpt;
      grid.innerHTML += `
        <a href="blog-post.html?slug=${post.slug}" class="blog-card">
          <img src="${post.image}" alt="${title}" class="blog-card__image blur-up" loading="lazy">
          <div class="blog-card__content">
            <div class="blog-card__date">${post.date} <span>·</span> ${post.readTime} ${t.blog.minRead}</div>
            <h2 class="blog-card__title">${title}</h2>
            <p class="blog-card__excerpt">${excerpt}</p>
            <span class="blog-card__link">${t.blog.readMore} →</span>
          </div>
        </a>
      `;
    });
    setTimeout(() => Animations.initBlurUpImages(), 100);
  }
  
  // Format date
  function formatDate(dateString) {
    const date = new Date(dateString);
    return date.toLocaleDateString(Language.current === 'gr' ? 'el-GR' : 'en-US', {
      year: 'numeric',
      month: 'short',
      day: 'numeric'
    });
  }
  
  // Truncate text
  function truncateText(text, maxLength) {
    if (text.length <= maxLength) return text;
    return text.substring(0, maxLength).trim() + '...';
  }
  
  // Fetch RSS feed
  async function fetchRSSFeed() {
    try {
      const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.printful.com/blog/feed');
      const data = await response.json();
      
      if (data.status === 'ok' && data.items && data.items.length > 0) {
        // Clear skeleton and show articles
        grid.innerHTML = '';
        
        // Get latest 6 articles
        const articles = data.items.slice(0, 6);
        
        articles.forEach(article => {
          const title = article.title;
          const excerpt = truncateText(article.description || article.contentSnippet || '', 120);
          const date = formatDate(article.pubDate);
          const image = article.thumbnail || article.enclosure?.link || 'https://via.placeholder.com/400x225/e5e5e5/666666?text=Printful+Blog';
          const link = article.link;
          
          grid.innerHTML += `
            <a href="${link}" target="_blank" class="blog-card" rel="noopener noreferrer">
              <img src="${image}" alt="${title}" class="blog-card__image blur-up" loading="lazy" onerror="this.src='https://via.placeholder.com/400x225/e5e5e5/666666?text=Printful+Blog'">
              <div class="blog-card__content">
                <div class="blog-card__date">${date}</div>
                <h2 class="blog-card__title">${title}</h2>
                <p class="blog-card__excerpt">${excerpt}</p>
                <span class="blog-card__link">Read More →</span>
                <div class="blog-card__source">Source: Printful Blog</div>
              </div>
            </a>
          `;
        });
        
        // Initialize animations after content is loaded
        setTimeout(() => Animations.initBlurUpImages(), 100);
        
      } else {
        throw new Error('Invalid RSS data');
      }
    } catch (error) {
      console.error('Failed to fetch RSS feed:', error);
      // Show fallback posts
      showFallbackPosts();
    }
  }
  
  // Initialize
  showSkeletonCards();
  fetchRSSFeed();
});
</script>
</body>
</html>
